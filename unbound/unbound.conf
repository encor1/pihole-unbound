server:
    # Detailgrad der Logs. 0 ist sehr ruhig, höhere Werte liefern mehr
    # Diagnoseinformationen. Für normalen Betrieb reicht 1.
    verbosity: 1

    # Unbound lauscht innerhalb des Containers auf allen Interfaces,
    # damit der Pi-hole-Container es über das interne Docker-Netz erreicht.
    interface: 0.0.0.0
    port: 5335

    # Für ein typisches IPv4-Heimnetz genügt IPv4. IPv6 kann später
    # gezielt aktiviert werden, sobald das Heimnetz vollständig dafür
    # konfiguriert ist.
    do-ip4: yes
    do-ip6: no
    prefer-ip6: no

    # DNS verwendet überwiegend UDP, fällt bei größeren Antworten aber
    # auf TCP zurück. Deshalb werden beide Protokolle aktiviert.
    do-udp: yes
    do-tcp: yes

    # Standardmäßig alle Zugriffe ablehnen und nur das interne Docker-Netz
    # erlauben. Unbound ist zusätzlich nicht auf dem Host veröffentlicht.
    access-control: 0.0.0.0/0 refuse
    access-control: 172.30.0.0/24 allow

    # DNSSEC-Vertrauensanker. Das Container-Image verwaltet die root.key
    # an diesem Ort und aktualisiert sie bei Bedarf.
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

    # Sicherheits- und Privacy-Einstellungen.
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: no
    harden-algo-downgrade: no
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    aggressive-nsec: yes

    # 1232 Byte gilt als robuster EDNS-Wert und reduziert Fragmentierung
    # auf modernen Netzen.
    edns-buffer-size: 1232

    # Häufig genutzte Antworten werden zwischengespeichert. Prefetch sorgt
    # dafür, dass oft abgefragte Einträge rechtzeitig erneuert werden.
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes

    # Private Adressbereiche dürfen nicht durch öffentliche DNS-Antworten
    # zurückgeliefert werden. Das schützt unter anderem vor DNS-Rebinding.
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # home.arpa ist der reservierte Namensraum für private Heimnetze.
    private-domain: "home.arpa"

    # Für diese kleine Installation ist ein einzelner Thread ausreichend.
    num-threads: 1
    so-reuseport: yes

    # Schutz vor einer sehr großen Zahl unerwünschter Antworten.
    unwanted-reply-threshold: 10000000

remote-control:
    # Es wird keine externe Unbound-Steuerung benötigt.
    control-enable: no
